# Render Blueprint za Invazivke — brezplačna postavitev.
# Podatki (opazovanja, fotografije, skrbniki) živijo v Turso (libSQL oblak,
# brezplačni paket), zato trajni disk ni potreben in zadošča Render Free.
#
# Postavitev:
#  1. Na https://turso.tech ustvari brezplačen račun in bazo; skopiraj
#     "Database URL" (libsql://...) in ustvari auth token.
#  2. Na https://dashboard.render.com > New > Blueprint izberi ta repozitorij.
#  3. Ob uvozu vpiši TURSO_DATABASE_URL in TURSO_AUTH_TOKEN.
services:
  - type: web
    name: invazivke
    runtime: node
    plan: free
    region: frankfurt      # najbližja Sloveniji
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: TURSO_DATABASE_URL
        sync: false          # vpišeš ob postavitvi (libsql://...)
      - key: TURSO_AUTH_TOKEN
        sync: false          # vpišeš ob postavitvi
      - key: ADMIN_TOKEN
        generateValue: true  # naključni zasilni žeton za prvo prijavo
