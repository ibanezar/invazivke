<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Invazivke – zemljevid opazovanj</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#1b4332" />
</head>
<body>
  <header>
    <a class="brand" href="/"><img src="logo-wordmark-light.svg" alt="Invazivke" /></a>
    <nav>
      <a href="/" class="active">Zemljevid</a>
      <a href="/katalog.html">Katalog vrst</a>
      <a href="/prijava.html">Prijavi opazovanje</a>
      <a href="/moje.html">Moje prijave</a>
      <a href="/stats.html">Statistika</a>
      <a href="/admin.html">Skrbništvo</a>
    </nav>
  </header>

  <main class="full">
    <div class="map-filters">
      <strong>Filtri</strong>
      <select id="f-species"><option value="">Vse vrste</option></select>
      <select id="f-status">
        <option value="potrjeno">Samo potrjena</option>
        <option value="">Vsa opazovanja</option>
        <option value="neverificirano">Neverificirana</option>
        <option value="vec-podatkov">Potrebuje več podatkov</option>
      </select>
      <input type="date" id="f-from" title="Od datuma" />
      <input type="date" id="f-to" title="Do datuma" />
      <span class="hint" id="f-count"></span>
    </div>
    <div id="map"></div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="app.js"></script>
  <script>
    const map = L.map('map').setView(SI_CENTER, 8);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    }).addTo(map);

    const layer = L.markerClusterGroup({ maxClusterRadius: 45 }).addTo(map);
    let species = {};

    async function refresh() {
      const params = new URLSearchParams();
      const sp = document.getElementById('f-species').value;
      const st = document.getElementById('f-status').value;
      const from = document.getElementById('f-from').value;
      const to = document.getElementById('f-to').value;
      if (sp) params.set('species', sp);
      if (st) params.set('status', st);
      if (from) params.set('from', from);
      if (to) params.set('to', to);

      const res = await fetch('/api/observations?' + params);
      const list = await res.json();
      layer.clearLayers();
      for (const o of list) {
        const s = species[o.species_id] || { name_sl: o.species_id, emoji: '❓' };
        const marker = L.marker([o.lat, o.lng]).addTo(layer);
        const div = document.createElement('div');
        div.className = 'obs-popup';
        div.innerHTML =
          `<div class="pop-head">` +
          (s.image ? `<img class="pop-ref" src="${s.image}" alt="${s.name_sl}" />` : `<span class="pop-emoji">${s.emoji}</span>`) +
          `<div><strong>${s.name_sl}</strong><br><em>${s.name_lat || ''}</em></div>` +
          `</div>` +
          `<div class="pop-meta">${fmtDate(o.created_at)} · ${o.quantity || 'količina ni podana'}</div>`;
        div.appendChild(badge(o.status, STATUS_LABELS[o.status]));
        if (o.photo) {
          const fig = document.createElement('figure');
          fig.className = 'pop-obs';
          fig.innerHTML = `<img class="popup-photo" src="${o.photo}" alt="Fotografija opazovanja" /><figcaption>fotografija opazovanja</figcaption>`;
          div.appendChild(fig);
        }
        marker.bindPopup(div);
      }
      document.getElementById('f-count').textContent = `Prikazanih: ${list.length}`;
    }

    (async () => {
      const list = await fetchSpecies();
      species = speciesById(list);
      const sel = document.getElementById('f-species');
      for (const s of list) {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = `${s.emoji} ${s.name_sl}`;
        sel.appendChild(opt);
      }
      for (const id of ['f-species', 'f-status', 'f-from', 'f-to']) {
        document.getElementById(id).addEventListener('change', refresh);
      }
      refresh();
    })();
  </script>
</body>
</html>
